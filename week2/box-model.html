<!DOCTYPE html>
<!--
  ================================================================
  2주차 연습 파일 (2) - 박스 모델 📦
  ================================================================
  목표: margin / border / padding 이 화면에서 어떻게 다른지 눈으로 익히기.

  ★ 구조는 다 있어요. <style> 안의 [TODO]만 채우세요! ★
  ★★ CSS 숫자엔 꼭 'px' 붙이기! (지난번 복습) ★★

  사용법: [TODO] 채우고 저장(Ctrl+S) → 새로고침(F5).
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>박스 모델 연습</title>

  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; line-height: 1.6; }

    /* 상자가 잘 보이도록 공통 배경 */
    .demo {
      background: #e0e7ff;
      border: 2px solid #6366f1;
    }


    /* ===== (예시) padding 으로 안쪽 여백 ===== */
    /* 내용과 테두리 사이가 벌어져요. 배경색이 padding까지 칠해지는 걸 보세요! */
    #ex-padding {
      padding: 24px;
    }


    /* ================= 여러분 차례! ================= */

    /* [TODO 1] #my-padding 에 padding 만 주기
       - padding: 30px;
       (내용 주변 안쪽이 넓어지고, 파란 배경이 그만큼 칠해져요) */
    #my-padding {
      padding: 30px;
    }


    /* [TODO 2] #my-margin 에 margin 만 주기
       - margin: 30px;
       (상자 '바깥' 거리가 벌어져요. 배경색은 안 칠해짐 = 투명!)
       padding과 뭐가 다른지 비교해보세요. */
    #my-margin {
      margin: 30px;
    }


    /* [TODO 3] #my-border 에 굵은 테두리 주기
       - border: 8px solid #ef4444;   (8px 두께 / 실선 / 빨강)
       - padding: 16px; */
    #my-border {
      border: 8px solid #ef4444;
      padding: 16px;
    }


    /* [TODO 4] 도전! #my-all 에 셋 다 주기 (진짜 박스 모델!)
       - margin: 20px;
       - border: 4px solid #10b981;
       - padding: 20px;
       - border-radius: 12px;  (모서리 둥글게) */
    #my-all {
      margin: 20px;
      border: 4px solid #10b981;
      padding: 20px;
      border-radius: 12px;
    }

  </style>
</head>

<body>

  <h1>박스 모델 📦</h1>
  <p>아래 상자들의 <b>안/밖 여백</b> 차이를 눈으로 비교해보세요.</p>

  <p>① 예시 (padding 24px):</p>
  <div class="demo" id="ex-padding">내용과 테두리 사이가 벌어졌죠?</div>

  <p>② [TODO 1] 내 padding:</p>
  <div class="demo" id="my-padding">padding 30px — 안쪽이 넓어져요</div>

  <p>③ [TODO 2] 내 margin:</p>
  <div class="demo" id="my-margin">margin 30px — 바깥 거리가 벌어져요</div>

  <p>④ [TODO 3] 내 border:</p>
  <div class="demo" id="my-border">두꺼운 빨간 테두리</div>

  <p>⑤ [TODO 4] 셋 다 (완성형 박스):</p>
  <div class="demo" id="my-all">margin + border + padding 전부!</div>

</body>
</html>
