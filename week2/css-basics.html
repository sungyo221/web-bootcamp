<!DOCTYPE html>
<!--
  ================================================================
  2주차 연습 파일 (1) - CSS 기초 🎨
  ================================================================
  목표: 선택자(태그/class/id) + 기본 속성(색/크기/배경/정렬)으로 꾸미기.

  ★ 구조는 다 만들어 뒀어요. 여러분은 <style> 안의 [TODO]만 채우면 돼요! ★

  사용법: 아래 <style> 안의 [TODO]를 채우고 저장(Ctrl+S) → 새로고침(F5).
  바뀌는 걸 눈으로 확인하면서 하세요!
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CSS 기초 연습</title>

  <style>
    /* ===== 이미 채워진 예시 (따라할 본보기) ===== */

    /* (예시 1) 태그 선택자: 모든 p의 글자색을 회색으로 */
    p {
      color: #4b4b4b;
    }

    /* (예시 2) body 전체에 기본 폰트/여백 */
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 30px auto;
      line-height: 1.6;
    }


    /* ================= 여기부터 여러분 차례! ================= */

    /* [TODO 1] 태그 선택자로 h1 꾸미기
       - color(글자색)을 원하는 색으로 (예: #6366f1)
       - text-align 을 center 로 (가운데 정렬) */
    h1 {
      color:#fa0800;
      text-align:center;
    }


    /* [TODO 2] class 선택자로 '.highlight' 꾸미기  (선택자 앞에 점 . 붙이기!)
       - background-color 를 노란색 계열로 (예: #fef08a)
       - padding 을 8px 로 (글자 주변 안쪽 여백) */
    .highlight {
      background-color: yellow;
      padding: 8px;
    }


    /* [TODO 3] id 선택자로 '#special' 꾸미기  (선택자 앞에 샵 # 붙이기!)
       - color 를 white(흰색)
       - background-color 를 원하는 진한 색 (예: #6366f1)
       - padding 을 12px
       - border-radius 를 8px (모서리 둥글게) */
    #special {
      color: white;
      background-color: #6366f1;
      padding: 12px;
      border-radius: 8px;
    }


    /* [TODO 4] 도전! .box 클래스 꾸미기
       - border: 2px solid #6366f1;  (테두리: 두께 종류 색)
       - padding: 16px;
       - margin-top: 16px; */
    .box {
      border: 2px solid #6366f1;
      padding: 16px;
      margin-top: 16px;
    }

  </style>
</head>

<body>

  <!-- 구조는 이미 완성! 위 <style>만 채우면 아래가 변신해요 -->

  <h1>CSS 첫걸음 🎨</h1>

  <p>이건 평범한 문단이에요. (예시 선택자로 회색이 됐어요)</p>

  <p>여기 <span class="highlight">이 부분만 형광펜</span> 효과를 줄 거예요.</p>

  <p id="special">나는 id가 special! 특별하게 꾸며질 거예요.</p>

  <div class="box">
    <p>나는 box 안에 있어요. 테두리 상자가 생길 거예요.</p>
  </div>

  <p>
    같은 class는 여러 번 써도 다 적용돼요:
    <span class="highlight">형광1</span>,
    <span class="highlight">형광2</span>,
    <span class="highlight">형광3</span>
  </p>

</body>
</html>
