<!DOCTYPE html>
<!--
  ================================================================
  4주차 복습 테스트 - 메모 저장기 📝💾
  ================================================================
  이벤트 · 입력 검증 · localStorage 를 스스로 떠올려 짜기!
  ★ 점검: addEventListener / .value / setItem·getItem / 따옴표 ★

  <script> 안의 [TODO]를 채우세요.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>4주차 복습 - 메모 저장기</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 30px auto; line-height: 1.7; }
    h1 { color: #f7df1e; background: #323330; padding: 12px 20px; border-radius: 8px; }
    textarea { width: 100%; height: 100px; padding: 12px; font-size: 16px;
               border: 2px solid #94a3b8; border-radius: 8px; box-sizing: border-box; }
    .count { font-size: 14px; color: #64748b; text-align: right; }
    button { padding: 12px 20px; font-size: 16px; border: none; border-radius: 8px;
             background: #6366f1; color: white; cursor: pointer; margin-top: 8px; }
    #status { margin-top: 12px; font-size: 16px; min-height: 22px; text-align: center; }
  </style>
</head>

<body>

  <h1>📝 메모 저장기</h1>
  <p>메모를 저장하면 <b>새로고침해도</b> 유지돼요!</p>

  <textarea id="memo" placeholder="메모를 입력하세요"></textarea>
  <div class="count" id="count">0 글자</div>
  <button id="saveBtn">저장</button>
  <div id="status"></div>


  <script>
    const memo = document.getElementById("memo");
    const count = document.getElementById("count");
    const saveBtn = document.getElementById("saveBtn");
    const status = document.getElementById("status");


    /* [복습 1] 페이지 열릴 때: 저장된 메모 불러오기
       - localStorage.getItem("myMemo") 로 저장된 값을 가져와서
       - 만약 값이 있으면(if) memo.value 에 넣기
       힌트:
         const saved = localStorage.getItem("myMemo");
         if (saved) { memo.value = saved; } */
    const saved = localStorage.getItem("myMemo");
    if (saved) {memo.value = saved;}


    /* [복습 2] 실시간 글자 수 세기 (input 이벤트)
       - memo 에 input 이벤트 연결해서
       - 칠 때마다 count.textContent 를 "○ 글자" 로 갱신
       힌트: memo.value.length 가 글자 수
         memo.addEventListener("input", function() {
           count.textContent = memo.value.length + " 글자";
         }); */
    memo.addEventListener("input", function() {
      count.textContent = memo.value.length;
    });


    /* [복습 3] 저장 버튼 (click 이벤트 + setItem)
       - saveBtn 클릭하면 memo.value 를 localStorage 에 저장
       - status.textContent 에 "저장됐어요! 💾" 표시
       힌트:
         saveBtn.addEventListener("click", function() {
           localStorage.setItem("myMemo", memo.value);
           status.textContent = "저장됐어요! 💾";
         }); */
      saveBtn.addEventListener("click", function() {
        localStorage.setItem("myMemo", memo.value);
        status.textContent = "저장됐어요!";
      });

  </script>

</body>
</html>
