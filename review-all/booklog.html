1<!DOCTYPE html>
<!--
  ================================================================
  종합 복습 2회차 (1~4주차) - 북로그 📚 (읽은 책 기록)
  ================================================================
  HTML + CSS + JS + localStorage 총정리.
  각 [TODO] 에 "몇 주차"인지 표시. 순서대로 채우면 완성!

  ★ 점검 포인트: 화면에 보이려면 'countBox.textContent = 값' 처럼
    꼭 textContent 에 '대입(=)' 해야 해요! ★
-->
<html lang="ko">
<head>
  <!-- [TODO 1] (1주차) 한글 안 깨지는 meta 태그 -->
  <meta charset="UTF-8">

  <title>북로그</title>

  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 0 auto; padding: 20px;
           line-height: 1.6; color: #1e293b; background: #fdf6f0; }

    /* [TODO 2] (2주차) header 를 메뉴바처럼!
       - display / justify-content: space-between / align-items: center
       - padding: 16px 20px / background-color: #c2410c / border-radius: 10px */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: #c2410c;
      border-radius: 10px;
    }

    .logo { color: white; font-size: 20px; font-weight: bold; }
    header .sub { color: #fed7aa; font-size: 14px; }

    .input-row { display: flex; gap: 8px; margin: 20px 0; }
    #bookInput { flex: 1; padding: 12px; font-size: 16px; border: 2px solid #fdba74; border-radius: 8px; }
    #addBtn { padding: 12px 20px; border: none; border-radius: 8px; background: #c2410c;
              color: white; cursor: pointer; font-size: 16px; }

    /* [TODO 3] (2주차) 각 책 항목(li) 카드 꾸미기
       - display / justify-content: space-between / align-items: center
       - background-color: white / padding: 14px 16px / margin: 8px 0 / border-radius: 8px */
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: white;
      padding: 14px 16px;
      margin: 8px 0;
      border-radius: 8px;
    }

    ul { list-style: none; padding: 0; }
    li button { border: none; background: #ef4444; color: white; padding: 6px 12px;
                border-radius: 6px; cursor: pointer; }
    .empty { color: #a8a29e; text-align: center; padding: 20px; }
    #count { text-align: center; color: #c2410c; font-weight: bold; margin-top: 10px; }
  </style>
</head>

<body>

  <!-- [TODO 4] (1주차) header 안에 넣기:
       - <div class="logo">📚 북로그</div>
       - <div class="sub">올해 읽은 책</div>
       (오타·따옴표 주의! class 이름 정확히) -->
  <header>
    <div class="logo">📚 북로그</div>
    <div class="sub">올해 읽은 책</div>
  </header>

  <main>
    <div class="input-row">
      <!-- [TODO 5] (1주차) 입력창 + 버튼:
           - <input type="text" id="bookInput" placeholder="책 제목 입력">
           - <button id="addBtn">추가</button> -->
      <input type="text" id="bookInput" placeholder="책 제목 입력">
      <button id="addBtn">추가</button>

    </div>

    <ul id="bookList"></ul>
    <div id="count"></div>
  </main>


  <script>
    /* ===== 요소 잡기 (3주차) ===== */
    const bookInput = document.getElementById("bookInput");
    const addBtn = document.getElementById("addBtn");
    const bookList = document.getElementById("bookList");
    const countBox = document.getElementById("count");

    /* ===== 불러오기 (4주차 localStorage + JSON) — 만들어 둠 ===== */
    let books = [];
    const saved = localStorage.getItem("myBooks");
    if (saved) {
      books = JSON.parse(saved);
    }

    /* ===== save() — 만들어 둠 ===== */
    function save() {
      localStorage.setItem("myBooks", JSON.stringify(books));
    }


    /* ===== render(): 화면 그리기 ===== */
    function render() {
      bookList.innerHTML = "";

      if (books.length === 0) {
        bookList.innerHTML = "<p class='empty'>아직 기록한 책이 없어요 📖</p>";
      }

      /* [TODO 6] (3주차 반복문) books 배열을 돌면서 <li> 만들기
         for 문의 (시작; 조건; 증가) 를 직접 채우세요!
         (시작 let i = 0 / 조건 i < books.length / 증가 i++) */
      for (let i = 0; i < books.length; i++) {
        const li = document.createElement("li");
        li.textContent = (i + 1) + ". " + books[i];

        const delBtn = document.createElement("button");
        delBtn.textContent = "삭제";
        delBtn.addEventListener("click", function() {
          books.splice(i, 1);
          save();
          render();
        });

        li.appendChild(delBtn);
        bookList.appendChild(li);
      }

      /* [TODO 7] (3주차 조건문) 권수 메시지 (★textContent 에 '대입(=)' 잊지 말기!★)
         - books.length 가 0보다 크면(>):
             countBox 의 textContent 를 "올해 " + books.length + "권 읽었어요! 📚" 로
           아니면:
             countBox 의 textContent 를 "" (빈 문자열) 로 */
      if (books.length > 0) {countBox.textContent = "올해" + books.length + "권 읽었어요!";}
      else {countBox.textContent = "";}

    }


    /* ===== addBook(): 책 추가 ===== */
    function addBook() {
      const text = bookInput.value;

      /* [TODO 8] (4주차 폼검증) 빈 칸이면 추가 안 하기 (if + return) */
      if (text === "") {return;}

      /* [TODO 9] (3·4주차) 추가 → 저장 → 입력창 비우기 → 다시 그리기
         (books.push / save / bookInput.value="" / render) */
      books.push(text);
      save();
      bookInput.value="";
      render();

    }


    /* [TODO 10] (3주차 이벤트) '추가' 버튼에 addBook 연결 */
    addBtn.addEventListener("click", addBook);

    /* 처음 한 번 그리기 */
    render();
  </script>

</body>
</html>
