<!DOCTYPE html>
<!--
  ================================================================
  3주차 연습 파일 (3) - 반복문 for 🔁
  ================================================================
  목표: for 문으로 같은 일을 여러 번 반복하기.
  구조: for (시작; 조건; 증가) { 반복할 일 }

  ★ <script> 안의 [TODO]를 채우세요. ★
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>반복문 연습</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; line-height: 1.7; }
    h1 { color: #f7df1e; background: #323330; padding: 12px 20px; border-radius: 8px; }
    #output { background: #f1f5f9; border: 2px solid #94a3b8; border-radius: 8px;
              padding: 16px; min-height: 40px; white-space: pre-line; font-family: Consolas, monospace; }
    .hint { color: #64748b; font-size: 14px; }
  </style>
</head>

<body>

  <h1>🔁 반복문 for</h1>
  <p class="hint">결과 ↓</p>
  <div id="output"></div>


  <script>
    function print(text) {
      document.getElementById("output").textContent += text + "\n";
    }
    document.getElementById("output").textContent = "";


    /* ===== (예시) 1부터 5까지 출력 =====
       i 가 1 → 2 → 3 → 4 → 5 로 바뀌며 5번 반복돼요.
       - let i = 1   : i를 1부터 시작
       - i <= 5      : i가 5 이하인 동안 계속
       - i++         : 한 바퀴 끝나면 i를 1 늘림  */
    for (let i = 1; i <= 5; i++) {
      print(i + "번째 줄");
    }
    print("--- 예시 끝 ---");


    /* ================= 여러분 차례! ================= */

    /* [TODO 1] 1부터 10까지 출력
       - for (let i = 1; i <= 10; i++) {
           print(i);
         } */
    for (let i = 1; i <= 10; i++){
      print(i);
    }


    /* [TODO 2] 구구단 3단 (반복 안에서 계산!)
       - for (let i = 1; i <= 9; i++) {
           print("3 x " + i + " = " + (3 * i));
         } */
    for (let i = 1; i <= 9; i++){
      print("3 x " + i + " = " + (3 * i));
    }


    /* [TODO 3] 1부터 100까지 '합' 구하기 (변수 누적)
       핵심: 합을 담을 상자 sum 을 0으로 시작해서, 반복마다 더해요.
       - let sum = 0;
       - for (let i = 1; i <= 100; i++) {
           sum = sum + i;     // sum 에 i 를 계속 더함
         }
       - print("1~100 합 = " + sum);     // 정답: 5050 */
    let sum = 0;
    for (let i = 1; i <= 100; i++){
      sum = sum + i;
    }
    print("1~100 합 = " + sum);


    /* [TODO 4] 도전! for + if 조합 (1~20 중 짝수만)
       - for (let i = 1; i <= 20; i++) {
           if (i % 2 === 0) {
             print(i + "는 짝수");
           }
         } */
    for (let i = 1; i <= 20; i++){
      if (i % 2 === 0){
        print(i + "는 짝수");
      }
    }

  </script>

</body>
</html>
