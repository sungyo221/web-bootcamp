<!DOCTYPE html>
<!--
  ================================================================
  3주차 연습 파일 (6) - 배열 Array 📚
  ================================================================
  목표: 여러 값을 배열에 담고, 인덱스로 꺼내고, 반복문으로 전부 출력.
  핵심: 인덱스는 0부터! / .length 개수 / .push 추가

  ★ <script> 안의 [TODO]를 채우세요. ★
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>배열 연습</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; line-height: 1.7; }
    h1 { color: #f7df1e; background: #323330; padding: 12px 20px; border-radius: 8px; }
    #output { background: #f1f5f9; border: 2px solid #94a3b8; border-radius: 8px;
              padding: 16px; min-height: 40px; white-space: pre-line; font-family: Consolas, monospace; }
    .hint { color: #64748b; font-size: 14px; }
  </style>
</head>

<body>

  <h1>📚 배열 Array</h1>
  <p class="hint">결과 ↓</p>
  <div id="output"></div>


  <script>
    function print(text) {
      document.getElementById("output").textContent += text + "\n";
    }
    document.getElementById("output").textContent = "";


    /* ===== (예시) 배열 만들고 하나씩 꺼내기 ===== */
    let 과일 = ["사과", "바나나", "포도"];
    print("0번: " + 과일[0]);      // 사과 (★0부터!★)
    print("1번: " + 과일[1]);      // 바나나
    print("개수: " + 과일.length); // 3
    print("------");


    /* ================= 여러분 차례! ================= */

    /* [TODO 1] 좋아하는 음식 배열 만들고 출력
       - let 음식 = ["치킨", "피자", "떡볶이"];  만들고
       - print(음식[0]);   // 치킨
       - print(음식[2]);   // 떡볶이  (2번이 세 번째!)
       - print("총 " + 음식.length + "개"); */
    let 음식 = ["치킨", "피자", "떡볶이"];
    print(음식[0]);
    print(음식[2]);
    print("총 " + 음식.length + "개");


    /* [TODO 2] push 로 추가하고 length 확인
       - 음식.push("라면");           // 맨 뒤에 추가
       - print("추가 후: " + 음식[3]);  // 라면
       - print("이제 " + 음식.length + "개"); */
    음식.push("라면");
    print("추가 후: " + 음식[3]);
    print("이제 " + 음식.length + "개");


    /* [TODO 3] ★배열 + 반복문★ 으로 전부 출력 (제일 중요!)
       - for (let i = 0; i < 음식.length; i++) {
           print(i + "번째: " + 음식[i]);
         }
       (i 가 0부터 length 미만까지 → 모든 칸을 하나씩!) */
    for (let i = 0; i < 음식.length; i++) {
           print(i + "번째: " + 음식[i]);
         }


    /* [TODO 4] 도전! 숫자 배열의 합 구하기 (배열+반복+누적)
       - let 점수 = [80, 95, 70, 100];  만들고
       - let 총점 = 0;
       - for (let i = 0; i < 점수.length; i++) {
           총점 = 총점 + 점수[i];
         }
       - print("총점: " + 총점);              // 345
       - print("평균: " + (총점 / 점수.length)); // 86.25  (개수로 나누기) */
         let 점수 = [80, 95, 70, 100];
         let 총점 = 0;
         for (let i = 0; i < 점수.length; i++) {
           총점 = 총점 + 점수[i];
         }
         print("총점: " + 총점);
         print("평균: " + (총점 / 점수.length));

  </script>

</body>
</html>
