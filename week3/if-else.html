<!DOCTYPE html>
<!--
  ================================================================
  3주차 연습 파일 (2) - 조건문 if / else 🔀
  ================================================================
  목표: if / else if / else 로 '상황에 따라 다르게' 동작시키기.
  핵심: 조건이 true 면 그 { } 안을 실행. 비교는 ===, >=, < 등.

  ★ <script> 안의 [TODO]를 채우세요. ★
  ★ "같다"는 === (등호 3개!), = 하나는 '담는다' ★
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>조건문 연습</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; line-height: 1.7; }
    h1 { color: #f7df1e; background: #323330; padding: 12px 20px; border-radius: 8px; }
    #output { background: #f1f5f9; border: 2px solid #94a3b8; border-radius: 8px;
              padding: 16px; min-height: 40px; white-space: pre-line; font-family: Consolas, monospace; }
    .hint { color: #64748b; font-size: 14px; }
  </style>
</head>

<body>

  <h1>🔀 조건문 if / else</h1>
  <p class="hint">결과 ↓</p>
  <div id="output"></div>


  <script>
    function print(text) {
      document.getElementById("output").textContent += text + "\n";
    }
    document.getElementById("output").textContent = "";


    /* ===== (예시) 나이로 성인/미성년 판단 ===== */
    let age = 20;
    if (age >= 19) {
      print("나이 " + age + ": 성인입니다");
    } else {
      print("나이 " + age + ": 미성년자입니다");
    }


    /* ================= 여러분 차례! ================= */

    /* [TODO 1] 점수로 합격/불합격
       - let score = 75;  만들고
       - if (score >= 60) { print("합격!"); }
         else { print("불합격"); }
       (score 값을 50, 90 등으로 바꿔보며 결과가 달라지는지 관찰!) */
    let score = 75;
    if (score >= 60){
      print("합격!");
    }
    else { print("불합격"); }


    /* [TODO 2] 짝수/홀수 판단 (나머지 연산자 % 사용)
       % 는 '나눈 나머지'예요. 짝수면 2로 나눈 나머지가 0!
       - let num = 8;  만들고
       - if (num % 2 === 0) { print(num + "은 짝수"); }
         else { print(num + "은 홀수"); }
       (★ '같다'는 === 등호 3개! ★) */
    let num = 8;
    if (num % 2 == 0){ print (num + "은 짝수"); }
    else {print(num + "은 홀수");}


    /* [TODO 3] else if 로 여러 단계 (성적 등급)
       - let point = 85;  만들고
       - if (point >= 90) { print("A 등급"); }
         else if (point >= 80) { print("B 등급"); }
         else if (point >= 70) { print("C 등급"); }
         else { print("재시험"); }
       (point 를 95, 65 등으로 바꿔 등급이 바뀌는지 보세요!) */
    let point = 85;
    if (point >= 90) {print("A 등급");}
    else if(point >= 80) {print("B 등급");}
    else if (point >= 70) { print("C 등급"); }
    else { print("재시험"); }


    /* [TODO 4] 도전! 문자열 비교 (=== 로 글자도 비교 가능)
       - const weather = "비";  만들고
       - if (weather === "비") { print("우산을 챙기세요 ☂"); }
         else { print("맑아요 ☀"); } */
    const weather = "비";
    if (weather === "비") { print("우산을 챙기세요 ☂"); }
    else { print("맑아요 ☀"); }

  </script>

</body>
</html>
