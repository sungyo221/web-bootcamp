<!DOCTYPE html>
<!--
  ============================================
  1주차 연습 파일 - HTML 기초
  ============================================
  사용법:
  1. 이 파일을 더블클릭하면 브라우저에서 열려요.
  2. 코드를 고친 뒤 저장(Ctrl+S)하고, 브라우저에서 새로고침(F5)하면 바뀐 게 보여요.
  3. 아래 [TODO] 부분을 직접 채워보세요!
-->
<html lang="ko">
<head>
  <!-- head 안의 내용은 화면에 직접 보이지 않아요. 페이지 '설정' 영역이에요. -->
  <meta charset="UTF-8">
  <title>나의 첫 HTML 연습</title>
</head>

<body>
  <!-- body 안의 내용이 실제 화면에 보입니다. -->

  <!-- 1. 제목: h1이 가장 크고 h6이 가장 작아요 -->
  <h1>안녕하세요! 👋</h1>

  <!-- [TODO 1] 아래에 h2 태그로 작은 제목을 하나 만들어보세요. 예: 자기소개 -->
  <h2>저는 웹개발자를 꿈꾸고 있는 정선교입니다.</h2>

  <!-- 2. 문단 -->
  <p>이것은 p 태그로 만든 문단이에요.</p>

  <!-- [TODO 2] 아래에 p 태그로 "나는 웹개발을 공부하고 있다" 라고 적어보세요. -->
  <p>나는 웹개발을 공부하고 있다</p>

  <!-- 3. 목록 (ul = 순서없는 목록, li = 항목) -->
  <h2>내가 배울 것</h2>
  <ul>
    <li>HTML</li>
    <!-- [TODO 3] li 태그를 2개 더 추가해서 CSS, JavaScript 를 넣어보세요. -->
     <li>CSS</li>
     <li>JavaScript</li>
  </ul>

  <!-- 4. 링크 (a 태그) -->
  <p>참고 사이트:
    <a href="https://developer.mozilla.org/ko/" target="_blank">MDN 문서 열기</a>
  </p>

  <!-- 5. 이미지 (src = 이미지 주소, alt = 설명) -->
  <img src="https://picsum.photos/200" alt="랜덤 이미지" width="200">

  <!-- [TODO 4] 도전: 위 width="200"을 width="400"으로 바꾸고 새로고침하면 어떻게 될까요? -->

</body>
</html>
