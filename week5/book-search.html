<!DOCTYPE html>
<!--
  ================================================================
  5주차 미니 프로젝트 - 책 검색 앱 🔍📚
  ================================================================
  입력 + fetch + 반복문 + try/catch 총동원!
  OpenLibrary API 로 진짜 책을 검색해요. (무료 / 키 불필요 / 인터넷 필요)

  검색 흐름: 입력창에 단어 → fetch 로 검색 → 결과 목록 표시.

  ★ <script> 안의 [TODO]를 채우세요. ★
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>책 검색</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; line-height: 1.6; padding: 0 16px; }
    h1 { color: #f7df1e; background: #323330; padding: 12px 20px; border-radius: 8px; text-align: center; }
    .search-row { display: flex; gap: 8px; margin: 20px 0; }
    #searchInput { flex: 1; padding: 12px; font-size: 16px; border: 2px solid #94a3b8; border-radius: 8px; }
    #searchBtn { padding: 12px 24px; border: none; border-radius: 8px; background: #6366f1;
                 color: white; cursor: pointer; font-size: 16px; }
    ul { list-style: none; padding: 0; }
    li { background: #f1f5f9; padding: 14px 16px; margin: 8px 0; border-radius: 8px; }
    li .title { font-weight: bold; color: #4338ca; }
    li .author { color: #64748b; font-size: 14px; }
    .status { text-align: center; color: #94a3b8; padding: 16px; }
  </style>
</head>

<body>

  <h1>🔍 책 검색</h1>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="책 제목이나 키워드 (예: harry potter)">
    <button id="searchBtn">검색</button>
  </div>

  <ul id="resultList"></ul>


  <script>
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const resultList = document.getElementById("resultList");


    async function searchBooks() {
      const keyword = searchInput.value;
      if (keyword === "") { return; }   // 빈 검색어 방어 (4주차 복습)

      resultList.innerHTML = "<p class='status'>검색 중... 🔎</p>";

      try {
        /* [TODO 1] keyword 로 검색 요청하기
           OpenLibrary 검색 주소는 "...search.json?q=" 뒤에 검색어를 붙여요.
           - const response = await fetch("https://openlibrary.org/search.json?q=" + keyword);
           - const data = await response.json();
           (data.docs 가 검색된 책들의 '배열' 이에요!) */
        const response = await fetch("https://openlibrary.org/search.json?q=" + keyword);
        const data = await response.json();


        resultList.innerHTML = "";

        /* 검색 결과가 없으면 안내하고 종료 (만들어 둠) */
        if (data.docs.length === 0) {
          resultList.innerHTML = "<p class='status'>결과가 없어요 😢</p>";
          return;
        }

        /* [TODO 2] data.docs 의 앞 10개를 반복문으로 목록에 표시
           각 책: data.docs[i].title (제목),  data.docs[i].author_name (저자, 배열일 수 있음)
           - for (let i = 0; i < 10; i++) {
               const book = data.docs[i];
               const li = document.createElement("li");
               li.innerHTML = "<div class='title'>" + book.title + "</div>" +
                              "<div class='author'>" + book.author_name + "</div>";
               resultList.appendChild(li);
             } */
        for (let i = 0; i < 10; i++) {
          const book = data.docs[i];
          const li = document.createElement("li");
          li.innerHTML = "<div class='title'>" + book.title + "</div>" +
                        "<div class='author'>" + book.author_name + "</div>";
          resultList.appendChild(li);
        }


      } catch (error) {
        /* 인터넷 오류 등 실패 시 여기로 (만들어 둠) */
        resultList.innerHTML = "<p class='status'>오류가 났어요. 인터넷을 확인하세요 ⚠️</p>";
      }
    }


    /* [TODO 3] 검색 실행되게 연결 (2가지!)
       ① searchBtn 클릭 시 searchBooks 실행
       ② searchInput 에서 Enter 키 누르면 searchBooks 실행 (4주차 keydown 복습!)
       - searchBtn.addEventListener("click", searchBooks);
       - searchInput.addEventListener("keydown", function(event) {
           if (event.key === "Enter") { searchBooks(); }
         }); */
    searchBtn.addEventListener("click", searchBooks);
    searchInput.addEventListener("keydown", function(event) {
      if(event.key === "Enter") {searchBooks();}
    });

  </script>

</body>
</html>
