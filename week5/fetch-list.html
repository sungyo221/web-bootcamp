<!DOCTYPE html>
<!--
  ================================================================
  5주차 연습 파일 (2) - fetch + 반복문 = 목록 🔁🌐
  ================================================================
  목표: API 에서 '여러 개'(배열)를 받아 반복문으로 화면에 목록 표시.
  핵심: 받은 data 가 배열이면 → for 로 돌면서 data[i].속성 꺼내기.

  ★ <script> 안의 [TODO]를 채우세요. 인터넷 연결 필요! ★
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>fetch 목록 연습</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; line-height: 1.6; }
    h1 { color: #f7df1e; background: #323330; padding: 12px 20px; border-radius: 8px; text-align: center; }
    button { font-size: 16px; padding: 12px 24px; border: none; border-radius: 8px;
             background: #6366f1; color: white; cursor: pointer; display: block; margin: 0 auto 20px; }
    ul { list-style: none; padding: 0; }
    li { background: #f1f5f9; padding: 14px 16px; margin: 8px 0; border-radius: 8px; }
    li b { color: #4338ca; }
    .loading { text-align: center; color: #94a3b8; }
  </style>
</head>

<body>

  <h1>🔁🌐 게시글 목록 불러오기</h1>
  <button id="loadBtn">게시글 불러오기</button>
  <ul id="postList"></ul>


  <script>
    const postList = document.getElementById("postList");
    const loadBtn = document.getElementById("loadBtn");


    /* ===== 게시글을 불러와 목록으로 그리는 async 함수 =====
       이 API 는 게시글 '배열' 을 줘요:
       [ { "id":1, "title":"제목...", "body":"내용..." }, { ... }, ... ]
       각 게시글의 title 을 목록으로 보여줄 거예요. */
    async function loadPosts() {
      postList.innerHTML = "<p class='loading'>불러오는 중...</p>";

      /* [TODO 1] fetch 3줄 공식으로 데이터 받기
         - const response = await fetch("https://jsonplaceholder.typicode.com/posts");
         - const data = await response.json();
         (data 는 게시글들이 담긴 배열이에요!) */
      const response = await fetch("https://jsonplaceholder.typicode.com/posts");
      const data = await response.json();


      /* 받아온 뒤 목록 비우기 (위 '불러오는 중' 지우기) */
      postList.innerHTML = "";

      /* [TODO 2] 반복문으로 data 를 돌면서 <li> 만들기
         (★ data 가 배열이니 3주차 패턴! 단, 100개라 너무 많으니 앞 10개만 ★)
         - for (let i = 0; i < 10; i++) {
             const li = document.createElement("li");
             li.innerHTML = "<b>" + (i + 1) + ".</b> " + data[i].title;
             postList.appendChild(li);
           } */
        for (let i = 0; i < 10; i++) {
          const li = document.createElement("li");
          li.innerHTML = "<b>" + (i + 1) + ".</b> " + data[i].title;
          postList.appendChild(li);
        }

    }


    /* [TODO 3] '불러오기' 버튼에 loadPosts 연결
       - loadBtn.addEventListener("click", loadPosts); */
    loadBtn.addEventListener("click", loadPosts);

  </script>

</body>
</html>
