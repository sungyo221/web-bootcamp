<!DOCTYPE html>
<!--
  ================================================================
  5주차 연습 파일 (1) - 비동기 & fetch 🌐
  ================================================================
  목표: 인터넷 API 에서 진짜 데이터를 가져와 화면에 표시.
  공식: async function { const res = await fetch(주소);
                         const data = await res.json();  사용! }

  ★ <script> 안의 [TODO]를 채우세요. ★
  ★ 인터넷 연결 필요! 버튼을 누르면 매번 새 데이터를 가져와요. ★
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>fetch 연습</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 30px auto; line-height: 1.7; text-align: center; }
    h1 { color: #f7df1e; background: #323330; padding: 12px 20px; border-radius: 8px; }
    button { font-size: 16px; padding: 12px 24px; margin: 10px; border: none;
             border-radius: 8px; background: #6366f1; color: white; cursor: pointer; }
    #dogImg { max-width: 100%; border-radius: 12px; margin-top: 16px; min-height: 50px; }
    #catFact { background: #f1f5f9; border-radius: 8px; padding: 16px; margin-top: 16px;
               min-height: 24px; }
    .label { color: #64748b; font-size: 14px; margin-top: 20px; }
  </style>
</head>

<body>

  <h1>🌐 fetch 연습</h1>

  <p class="label">① 랜덤 강아지 사진 (TODO)</p>
  <button id="dogBtn">강아지 보기 🐶</button>
  <br>
  <img id="dogImg" alt="강아지 사진이 여기 나와요">

  <p class="label">② 랜덤 고양이 상식 (예시 — 이미 작동)</p>
  <button id="catBtn">고양이 상식 🐱</button>
  <div id="catFact">버튼을 눌러보세요</div>


  <script>
    const dogImg = document.getElementById("dogImg");
    const catFact = document.getElementById("catFact");


    /* ===== (예시) 고양이 상식 가져오기 =====
       async/await + fetch + .json() 의 3줄 공식! */
    async function getCatFact() {
      catFact.textContent = "불러오는 중...";
      const response = await fetch("https://catfact.ninja/fact");  // ① 요청
      const data = await response.json();                          // ② 변환
      catFact.textContent = data.fact;                             // ③ 사용 (영어로 나와요)
    }
    document.getElementById("catBtn").addEventListener("click", getCatFact);


    /* ================= 여러분 차례! ================= */

    /* [TODO 1] 강아지 사진 가져오는 async 함수 완성하기
       이 API 는 { "message": "사진주소", "status": "success" } 를 줘요.
       즉 data.message 안에 사진 주소가 들어있어요!

       async function getDog() {
         const response = await fetch("https://dog.ceo/api/breeds/image/random");
         const data = await response.json();
         dogImg.src = data.message;     // <img> 의 주소를 받은 사진으로!
       } */
      async function getDog() {
        const response = await fetch("https://dog.ceo/api/breeds/image/random");
        const data = await response.json();
        dogImg.src = data.message;
      }



    /* [TODO 2] '강아지 보기' 버튼(id="dogBtn")에 getDog 연결
       - document.getElementById("dogBtn").addEventListener("click", getDog); */
      document.getElementById("dogBtn").addEventListener("click", getDog);

  </script>

</body>
</html>
