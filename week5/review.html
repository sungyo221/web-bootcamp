<!DOCTYPE html>
<!--
  ================================================================
  5주차 복습 테스트 - 농담(Joke) 가져오기 😂
  ================================================================
  fetch · async/await · try/catch · 데이터 꺼내기 스스로 짜기!
  무료 API: https://official-joke-api.appspot.com/random_joke
  → { "setup": "질문...", "punchline": "답..." } (객체 하나를 줌)

  <script> 안의 [TODO]를 채우세요. 인터넷 연결 필요!
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>5주차 복습 - 농담</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 30px auto; line-height: 1.7; text-align: center; padding: 0 16px; }
    h1 { color: #f7df1e; background: #323330; padding: 12px 20px; border-radius: 8px; }
    button { font-size: 16px; padding: 12px 24px; border: none; border-radius: 8px;
             background: #6366f1; color: white; cursor: pointer; }
    #setup { font-size: 18px; font-weight: bold; margin-top: 20px; min-height: 24px; }
    #punchline { font-size: 18px; color: #6366f1; margin-top: 10px; min-height: 24px; }
  </style>
</head>

<body>

  <h1>😂 영어 농담 가져오기</h1>
  <button id="jokeBtn">농담 보기</button>
  <div id="setup"></div>
  <div id="punchline"></div>


  <script>
    const jokeBtn = document.getElementById("jokeBtn");
    const setupBox = document.getElementById("setup");
    const punchlineBox = document.getElementById("punchline");


    async function getJoke() {
      setupBox.textContent = "불러오는 중...";
      punchlineBox.textContent = "";

      /* [복습 1] try 로 감싸기 시작 (아래 catch 와 짝!)
         여기에 'try {' 를 적으세요. */
      try {

        /* [복습 2] fetch 3줄 공식으로 농담 데이터 받기
           주소: https://official-joke-api.appspot.com/random_joke
           - const response = await fetch( 위 주소 );
           - const data = await response.json();
           (data 는 { setup, punchline } 객체 하나예요!) */
        const response = await fetch("https://official-joke-api.appspot.com/random_joke");
        const data = await response.json();


        /* [복습 3] 받은 데이터를 화면에 표시
           - setupBox.textContent = data.setup;        // 질문 부분
           - punchlineBox.textContent = data.punchline; // 답 부분
           (★ 객체니까 점(.) 으로 꺼내기! ★) */
        setupBox.textContent = data.setup;
        punchlineBox.textContent = data.punchline;


      /* [복습 4] catch 로 에러 처리 마무리
         여기에 다음을 적으세요:
         } catch (error) {
           setupBox.textContent = "오류! 인터넷을 확인하세요 ⚠️";
         } */
      } catch (error) {
        setupBox.textContent = "오류! 인터넷을 확인하세요 ⚠️";
      }
    }


    /* [복습 5] '농담 보기' 버튼에 getJoke 연결 */
    jokeBtn.addEventListener("click", getJoke);

  </script>

</body>
</html>
